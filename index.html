<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Entrenamiento · Rafael</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --muted: #666;
    --dim: #444;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --accent3: #f0a060;
    --accent4: #a060f0;
    --danger: #f06060;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
    --r: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }
  .header { padding: 16px 16px 0; flex-shrink: 0; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .logo { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .week-badge { font-family: var(--font-mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 99px; color: var(--muted); cursor: pointer; }
  .week-badge span { color: var(--accent); }

  /* Day tabs */
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding: 0 16px 14px; scrollbar-width: none; flex-shrink: 0; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 7px 14px; border-radius: 99px; font-size: 12px; font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; white-space: nowrap; }
  .tab.active { color: var(--bg); border-color: transparent; }
  .tab.done { position: relative; }
  .tab.done::after { content: ''; position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 0 16px 100px; }

  /* Day header */
  .day-header { margin-bottom: 18px; }
  .day-name { font-size: 22px; font-weight: 300; color: var(--text); margin-bottom: 2px; }
  .day-focus { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }
  .day-focus span { color: var(--accent2); }

  /* Exercise card */
  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; }
  .ex-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
  .ex-name { font-size: 13px; font-weight: 500; flex: 1; }
  .ex-spec { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-left: 8px; white-space: nowrap; }
  .ex-chevron { font-size: 10px; color: var(--dim); margin-left: 8px; transition: transform 0.2s; }
  .ex-card.open .ex-chevron { transform: rotate(180deg); }
  .ex-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .ex-card.open .ex-body { display: block; }

  /* Sets */
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr auto; gap: 8px; align-items: center; margin-top: 10px; }
  .set-num { font-family: var(--font-mono); font-size: 11px; color: var(--dim); text-align: center; }
  .set-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 7px 8px; width: 100%; text-align: center; outline: none; -webkit-appearance: none; }
  .set-input:focus { border-color: var(--accent2); }
  .set-input::placeholder { color: var(--dim); }
  .set-label { font-size: 10px; color: var(--dim); text-align: center; margin-top: 2px; font-family: var(--font-mono); }
  .set-check { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .set-check.checked { background: var(--accent); border-color: var(--accent); }
  .set-check.checked::after { content: '✓'; font-size: 13px; color: var(--bg); font-weight: 500; }
  .col-headers { display: grid; grid-template-columns: 28px 1fr 1fr 28px; gap: 8px; margin-top: 10px; }
  .col-h { font-size: 10px; color: var(--dim); font-family: var(--font-mono); text-align: center; letter-spacing: 0.05em; }

  /* Notes */
  .notes-area { margin-top: 12px; }
  .notes-label { font-size: 10px; color: var(--dim); font-family: var(--font-mono); margin-bottom: 6px; letter-spacing: 0.05em; }
  .notes-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-sans); font-size: 12px; padding: 8px; outline: none; resize: none; min-height: 50px; }
  .notes-input:focus { border-color: var(--accent2); }

  /* Rest day */
  .rest-day { text-align: center; padding: 48px 24px; }
  .rest-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.3; }
  .rest-title { font-size: 18px; font-weight: 300; color: var(--muted); margin-bottom: 8px; }
  .rest-sub { font-size: 12px; color: var(--dim); font-family: var(--font-mono); }

  /* Bottom bar */
  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 12px 16px; background: var(--bg); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .btn-complete { flex: 1; padding: 12px; border-radius: var(--r); font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; cursor: pointer; border: none; background: var(--accent); color: var(--bg); transition: opacity 0.15s; }
  .btn-complete:active { opacity: 0.8; }
  .btn-clear { padding: 12px 16px; border-radius: var(--r); font-family: var(--font-mono); font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--dim); }

  /* Progress bar */
  .progress-bar { height: 2px; background: var(--border); margin-bottom: 14px; border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.3s; }

  /* Stats strip */
  .stats-strip { display: flex; gap: 8px; margin-bottom: 18px; }
  .stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 10px; }
  .stat-val { font-family: var(--font-mono); font-size: 15px; font-weight: 500; color: var(--text); }
  .stat-label { font-size: 10px; color: var(--dim); font-family: var(--font-mono); margin-top: 2px; letter-spacing: 0.04em; }

  /* Week modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-top: 1px solid var(--border); border-radius: 12px 12px 0 0; padding: 20px 16px 40px; width: 100%; max-width: 480px; margin: 0 auto; }
  .modal-title { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 16px; }
  .week-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
  .week-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--surface2); border-radius: var(--r); cursor: pointer; border: 1px solid transparent; }
  .week-item.active { border-color: var(--accent); }
  .week-item-label { font-family: var(--font-mono); font-size: 13px; }
  .week-item-stats { font-size: 11px; color: var(--dim); font-family: var(--font-mono); }
  .modal-close { width: 100%; margin-top: 12px; padding: 12px; border-radius: var(--r); border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--font-mono); font-size: 12px; cursor: pointer; }

  /* Toast */
  .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--accent); color: var(--bg); font-family: var(--font-mono); font-size: 12px; padding: 10px 20px; border-radius: 99px; z-index: 200; transition: transform 0.3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Color accents per day */
  .tab[data-day="lun"].active { background: var(--accent); }
  .tab[data-day="mar"].active { background: var(--accent2); }
  .tab[data-day="jue"].active { background: var(--accent4); }
  .tab[data-day="sab"].active { background: var(--accent3); }
  .tab[data-day="mie"].active, .tab[data-day="vie"].active, .tab[data-day="dom"].active { background: var(--surface2); color: var(--muted); border-color: var(--border); }
  .day-lun .day-name { color: var(--accent); }
  .day-mar .day-name { color: var(--accent2); }
  .day-jue .day-name { color: var(--accent4); }
  .day-sab .day-name { color: var(--accent3); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">Entrenamiento · Rafael</div>
      <div class="week-badge" id="weekBadge">Semana <span id="weekNum">1</span> ↓</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>

  <div class="bottom-bar" id="bottomBar">
    <button class="btn-complete" id="btnComplete">MARCAR DÍA COMPLETO</button>
    <button class="btn-clear" id="btnClear">↺</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">SELECCIONAR SEMANA</div>
    <div class="week-list" id="weekList"></div>
    <button class="modal-close" id="modalClose">CERRAR</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = [
  { id: 'lun', label: 'LUN', name: 'Lunes', type: 'train',
    focus: ['Empuje', 'Pecho · Hombro · Tríceps'],
    exercises: [
      { name: 'Press banca plana', sets: 4, target: '6–8 reps' },
      { name: 'Press inclinado mancuernas', sets: 3, target: '8–10 reps' },
      { name: 'Press militar barra', sets: 4, target: '6–8 reps' },
      { name: 'Elevaciones laterales', sets: 4, target: '12–15 reps' },
      { name: 'Extensión tríceps polea', sets: 3, target: '12 reps' },
      { name: 'Fondos en paralelas', sets: 3, target: '10 reps' },
    ]
  },
  { id: 'mar', label: 'MAR', name: 'Martes', type: 'train',
    focus: ['Jale', 'Espalda · Bíceps'],
    exercises: [
      { name: 'Dominadas / jalón al pecho', sets: 4, target: '6–8 reps' },
      { name: 'Remo con barra', sets: 4, target: '8–10 reps' },
      { name: 'Remo mancuerna unilateral', sets: 3, target: '10 reps c/lado' },
      { name: 'Face pulls en polea', sets: 3, target: '15 reps' },
      { name: 'Curl con barra', sets: 3, target: '10–12 reps' },
      { name: 'Curl martillo mancuernas', sets: 2, target: '12 reps' },
    ]
  },
  { id: 'mie', label: 'MIÉ', name: 'Miércoles', type: 'rest' },
  { id: 'jue', label: 'JUE', name: 'Jueves', type: 'train',
    focus: ['Piernas', 'Cuádriceps · Posterior · Glúteo'],
    exercises: [
      { name: 'Sentadilla trasera', sets: 4, target: '6–8 reps' },
      { name: 'Peso muerto rumano', sets: 4, target: '8–10 reps' },
      { name: 'Prensa de piernas', sets: 3, target: '10–12 reps' },
      { name: 'Extensión de cuádriceps', sets: 3, target: '12 reps' },
      { name: 'Curl femoral sentado', sets: 3, target: '12 reps' },
      { name: 'Elevación de talones', sets: 4, target: '15 reps' },
    ]
  },
  { id: 'vie', label: 'VIE', name: 'Viernes', type: 'rest' },
  { id: 'sab', label: 'SÁB', name: 'Sábado', type: 'train',
    focus: ['Full body + Zona 2', 'Compuestos · Core · Cardio'],
    exercises: [
      { name: 'Peso muerto convencional', sets: 3, target: '5 reps (pesado)' },
      { name: 'Sentadilla búlgara', sets: 3, target: '8 reps c/lado' },
      { name: 'Press banca agarre cerrado', sets: 3, target: '8–10 reps' },
      { name: 'Remo en polea sentado', sets: 3, target: '10 reps' },
      { name: 'Plancha + variantes core', sets: 3, target: '30–45 seg' },
      { name: 'Cardio zona 2 (bici/cinta)', sets: 1, target: '20–25 min · 114–133 lpm' },
    ]
  },
  { id: 'dom', label: 'DOM', name: 'Domingo', type: 'rest' },
];

const TOTAL_WEEKS = 12;
let state = JSON.parse(localStorage.getItem('rf_train') || '{}');
let currentDay = 'lun';
let currentWeek = state.currentWeek || 1;

function weekKey(w) { return `w${w}`; }
function dayKey(w, d) { return `${weekKey(w)}_${d}`; }

function getWeekData(w) { return state[weekKey(w)] || {}; }
function getDayData(w, d) { return state[dayKey(w, d)] || { sets: {}, notes: {}, done: false }; }
function saveDayData(w, d, data) {
  if (!state[weekKey(w)]) state[weekKey(w)] = {};
  state[dayKey(w, d)] = data;
  state.currentWeek = currentWeek;
  localStorage.setItem('rf_train', JSON.stringify(state));
}

function getCompletedDays(w) {
  return DAYS.filter(d => d.type === 'train' && getDayData(w, d.id).done).length;
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = DAYS.map(d => {
    const data = getDayData(currentWeek, d.id);
    const isDone = data.done;
    return `<div class="tab${currentDay === d.id ? ' active' : ''}${isDone ? ' done' : ''}" 
      data-day="${d.id}" onclick="selectDay('${d.id}')">${d.label}</div>`;
  }).join('');
}

function renderContent() {
  const day = DAYS.find(d => d.id === currentDay);
  const content = document.getElementById('content');
  const data = getDayData(currentWeek, currentDay);

  if (day.type === 'rest') {
    const tips = { mie: 'Caminata 20–30 min opcional · macros reducidos hoy', vie: 'Colchón para guardias · macros reducidos hoy', dom: 'Recuperación completa · macros reducidos hoy' };
    content.innerHTML = `<div class="rest-day">
      <div class="rest-icon">◯</div>
      <div class="rest-title">Día de descanso</div>
      <div class="rest-sub">${tips[day.id]}</div>
    </div>`;
    document.getElementById('bottomBar').style.display = 'none';
    return;
  }

  document.getElementById('bottomBar').style.display = 'flex';

  const totalSets = day.exercises.reduce((a, e) => a + e.sets, 0);
  const checkedSets = Object.values(data.sets || {}).filter(Boolean).length;
  const pct = totalSets > 0 ? Math.round((checkedSets / totalSets) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  const trainDays = DAYS.filter(d => d.type === 'train').length;
  const doneDays = getCompletedDays(currentWeek);

  content.innerHTML = `
    <div class="day-header day-${day.id}">
      <div class="day-name">${day.name}</div>
      <div class="day-focus">${day.focus[0]} · <span>${day.focus[1]}</span></div>
    </div>
    <div class="stats-strip">
      <div class="stat"><div class="stat-val">${checkedSets}/${totalSets}</div><div class="stat-label">SERIES HOY</div></div>
      <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-label">COMPLETADO</div></div>
      <div class="stat"><div class="stat-val">${doneDays}/${trainDays}</div><div class="stat-label">DÍAS SEM ${currentWeek}</div></div>
    </div>
    ${day.exercises.map((ex, ei) => renderExCard(ex, ei, data)).join('')}
  `;
}

function renderExCard(ex, ei, data) {
  const isOpen = data.open && data.open[ei];
  const rows = Array.from({length: ex.sets}, (_, si) => {
    const key = `${ei}_${si}`;
    const kg = (data.sets_kg && data.sets_kg[key]) || '';
    const reps = (data.sets_reps && data.sets_reps[key]) || '';
    const checked = (data.sets && data.sets[key]) || false;
    return `<div class="set-row">
      <div class="set-num">${si + 1}</div>
      <div>
        <input class="set-input" type="number" placeholder="—" value="${kg}" 
          oninput="saveSetVal(${ei},${si},'kg',this.value)" inputmode="decimal" />
        <div class="set-label">KG</div>
      </div>
      <div>
        <input class="set-input" type="number" placeholder="—" value="${reps}"
          oninput="saveSetVal(${ei},${si},'reps',this.value)" inputmode="numeric" />
        <div class="set-label">REPS</div>
      </div>
      <div class="set-check${checked ? ' checked' : ''}" onclick="toggleSet(${ei},${si})"></div>
    </div>`;
  }).join('');

  const noteKey = `ex_${ei}`;
  const note = (data.notes && data.notes[noteKey]) || '';

  return `<div class="ex-card${isOpen ? ' open' : ''}" id="ex_${ei}">
    <div class="ex-header" onclick="toggleEx(${ei})">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-spec">${ex.sets}×${ex.target}</div>
      <div class="ex-chevron">▼</div>
    </div>
    <div class="ex-body">
      <div class="col-headers">
        <div class="col-h">SET</div><div class="col-h">KG</div><div class="col-h">REPS</div><div class="col-h">✓</div>
      </div>
      ${rows}
      <div class="notes-area">
        <div class="notes-label">NOTAS</div>
        <textarea class="notes-input" placeholder="sensaciones, ajustes, próxima sesión…" 
          oninput="saveNote(${ei},this.value)">${note}</textarea>
      </div>
    </div>
  </div>`;
}

function toggleEx(ei) {
  const data = getDayData(currentWeek, currentDay);
  if (!data.open) data.open = {};
  data.open[ei] = !data.open[ei];
  saveDayData(currentWeek, currentDay, data);
  const card = document.getElementById(`ex_${ei}`);
  card.classList.toggle('open', data.open[ei]);
  card.querySelector('.ex-chevron').style.transform = data.open[ei] ? 'rotate(180deg)' : '';
}

function toggleSet(ei, si) {
  const data = getDayData(currentWeek, currentDay);
  if (!data.sets) data.sets = {};
  const key = `${ei}_${si}`;
  data.sets[key] = !data.sets[key];
  saveDayData(currentWeek, currentDay, data);
  const el = document.querySelector(`#ex_${ei} .set-row:nth-child(${si + 3}) .set-check`);
  if (el) el.classList.toggle('checked', data.sets[key]);
  updateProgress();
}

function saveSetVal(ei, si, type, val) {
  const data = getDayData(currentWeek, currentDay);
  const key = `${ei}_${si}`;
  if (type === 'kg') { if (!data.sets_kg) data.sets_kg = {}; data.sets_kg[key] = val; }
  else { if (!data.sets_reps) data.sets_reps = {}; data.sets_reps[key] = val; }
  saveDayData(currentWeek, currentDay, data);
}

function saveNote(ei, val) {
  const data = getDayData(currentWeek, currentDay);
  if (!data.notes) data.notes = {};
  data.notes[`ex_${ei}`] = val;
  saveDayData(currentWeek, currentDay, data);
}

function updateProgress() {
  const day = DAYS.find(d => d.id === currentDay);
  if (day.type === 'rest') return;
  const data = getDayData(currentWeek, currentDay);
  const totalSets = day.exercises.reduce((a, e) => a + e.sets, 0);
  const checkedSets = Object.values(data.sets || {}).filter(Boolean).length;
  const pct = totalSets > 0 ? Math.round((checkedSets / totalSets) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  const statEls = document.querySelectorAll('.stat-val');
  if (statEls[0]) statEls[0].textContent = `${checkedSets}/${totalSets}`;
  if (statEls[1]) statEls[1].textContent = `${pct}%`;
}

function selectDay(id) {
  currentDay = id;
  renderTabs();
  renderContent();
}

function markDone() {
  const data = getDayData(currentWeek, currentDay);
  data.done = true;
  saveDayData(currentWeek, currentDay, data);
  renderTabs();
  showToast('Día completado ✓');
}

function clearDay() {
  saveDayData(currentWeek, currentDay, { sets: {}, notes: {}, open: {}, done: false });
  renderContent();
  renderTabs();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function renderWeekModal() {
  const list = document.getElementById('weekList');
  list.innerHTML = Array.from({length: TOTAL_WEEKS}, (_, i) => {
    const w = i + 1;
    const done = getCompletedDays(w);
    const trainDays = DAYS.filter(d => d.type === 'train').length;
    return `<div class="week-item${w === currentWeek ? ' active' : ''}" onclick="selectWeek(${w})">
      <span class="week-item-label">Semana ${w}</span>
      <span class="week-item-stats">${done}/${trainDays} días</span>
    </div>`;
  }).join('');
}

function selectWeek(w) {
  currentWeek = w;
  state.currentWeek = w;
  localStorage.setItem('rf_train', JSON.stringify(state));
  document.getElementById('weekNum').textContent = w;
  document.getElementById('modalOverlay').classList.remove('open');
  renderTabs();
  renderContent();
}

document.getElementById('weekBadge').onclick = () => {
  renderWeekModal();
  document.getElementById('modalOverlay').classList.add('open');
};
document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('modalOverlay').onclick = (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); };
document.getElementById('btnComplete').onclick = markDone;
document.getElementById('btnClear').onclick = clearDay;

document.getElementById('weekNum').textContent = currentWeek;
renderTabs();
renderContent();
</script>
</body>
</html>
